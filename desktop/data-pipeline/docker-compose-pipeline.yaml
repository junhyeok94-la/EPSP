version: '3.8'

networks:
  ecommerce-data-network:
    external: true
    name: ecommerce-data-network

services:
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ecommerce-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:9092,EXTERNAL://${TAILSCALE_DESKTOP_IP:-localhost}:9094'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: '-Xms512m -Xmx512m'
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: 'H5_1S7vERNin56RHdeYspw'
    networks:
      - ecommerce-data-network
    restart: always

  connect:
    build:
      context: ./kafka-connect
      dockerfile: Dockerfile
    container_name: ecommerce-connect
    depends_on:
      - kafka
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: 'kafka:9092'
      GROUP_ID: 'ecommerce-connect-group'
      CONFIG_STORAGE_TOPIC: 'ecommerce_connect_configs'
      OFFSET_STORAGE_TOPIC: 'ecommerce_connect_offsets'
      STATUS_STORAGE_TOPIC: 'ecommerce_connect_statuses'
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: 'org.apache.kafka.connect.json.JsonConverter'
      VALUE_CONVERTER: 'org.apache.kafka.connect.json.JsonConverter'
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: 'false'
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: 'false'
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
    networks:
      - ecommerce-data-network
    restart: always

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: ecommerce-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: default
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-init/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - ecommerce-data-network
    restart: always

  flink-jobmanager:
    image: flink:1.17.1-scala_2.12
    container_name: ecommerce-flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - "FLINK_PROPERTIES=jobmanager.rpc.address: flink-jobmanager"
    networks:
      - ecommerce-data-network
    restart: always

  flink-taskmanager:
    image: flink:1.17.1-scala_2.12
    container_name: ecommerce-flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - "FLINK_PROPERTIES=jobmanager.rpc.address: flink-jobmanager"
    networks:
      - ecommerce-data-network
    restart: always

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ecommerce-kafka-ui
    ports:
      - "8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_CONNECT_0_NAME: local-connect
      KAFKA_CLUSTERS_0_CONNECT_0_ADDRESS: http://connect:8083
    networks:
      - ecommerce-data-network
    restart: always

volumes:
  clickhouse_data:
