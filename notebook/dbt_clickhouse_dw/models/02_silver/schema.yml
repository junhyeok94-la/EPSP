version: 2

models:
  - name: dim_calendar
    description: "달력 차원 테이블. 일자별 연도, 분기, 월, 주말 여부 등의 메타데이터를 제공합니다."
    columns:
      - name: date_id
        description: "날짜 고유 식별자 (형식: YYYYMMDD 정수형, 예: 20250402)"
      - name: full_date
        description: "실제 날짜 데이터 (형식: YYYY-MM-DD)"
      - name: day
        description: "일 (1-31)"
      - name: month
        description: "월 (1-12)"
      - name: month_name
        description: "월 명칭 (예: January, April 등)"
      - name: quarter
        description: "분기 (1-4)"
      - name: year
        description: "연도 (예: 2025)"
      - name: day_name
        description: "요일 명칭 (예: Wednesday, Sunday 등)"
      - name: is_weekend
        description: "주말 여부 (true: 주말, false: 평일)"

  - name: dim_channel
    description: "고객 유입 및 마케팅 채널 차원 테이블입니다."
    columns:
      - name: channel_id
        description: "유입 채널 고유 ID"
      - name: channel_name
        description: "채널명 (예: Organic, Paid Search, Social 등)"
      - name: channel_type
        description: "채널 유형 (예: Digital, Offline)"
      - name: description
        description: "채널 상세 설명"

  - name: dim_campaign
    description: "마케팅 캠페인 마스터 차원 테이블입니다. 예산과 캠페인 유형 정보를 제공합니다."
    columns:
      - name: campaign_id
        description: "캠페인 고유 ID"
      - name: campaign_name
        description: "캠페인 명칭"
      - name: campaign_type
        description: "캠페인 유형 (예: Awareness, Retention, Acquisition 등)"
      - name: channel_id
        description: "연계된 마케팅 채널 ID (dim_channel 테이블 참조)"
      - name: start_date
        description: "캠페인 시작일 (YYYY-MM-DD)"
      - name: end_date
        description: "캠페인 종료일 (YYYY-MM-DD)"
      - name: budget
        description: "캠페인 집행 예산"
      - name: objective
        description: "캠페인 목표 (예: Conversion, Engagement 등)"

  - name: dim_location
    description: "지역 정보 마스터 차원 테이블입니다. 위경도 및 지역 구분을 제공합니다."
    columns:
      - name: location_id
        description: "지역 고유 ID"
      - name: state
        description: "주/도 행정구역명 (예: Maharashtra, Karnataka 등)"
      - name: city
        description: "도시명 (예: Mumbai, Bangalore 등)"
      - name: postal_code
        description: "우편번호"
      - name: region
        description: "권역구분 (예: West, East, North, South)"
      - name: latitude
        description: "위도"
      - name: longitude
        description: "경도"
      - name: area_type
        description: "지역 특성 (예: Urban, Suburban, Rural)"
      - name: location_category
        description: "도시 등급 분류 (예: Tier-1, Tier-2)"

  - name: dim_customer
    description: "고객 차원 테이블. 인적사항 및 거주지역, 소득수준을 포함합니다. 민감 개인정보가 제외/대체되었습니다."
    columns:
      - name: customer_id
        description: "고객 고유 ID (SHA-256 단방향 암호화 처리됨)"
      - name: location_id
        description: "고객 거주지역 ID (dim_location 테이블 참조)"
      - name: gender
        description: "성별 (M: 남성, F: 여성)"
      - name: date_of_birth
        description: "생년월일 (YYYY-MM-DD)"
      - name: registration_date
        description: "가입 일자 (YYYY-MM-DD)"
      - name: income_bracket
        description: "소득 분위 (예: High, Middle, Low)"
      - name: marital_status
        description: "결혼 여부 (Married: 기혼, Single: 미혼)"

  - name: dim_delivery_person
    description: "배송 기사 마스터 차원 테이블입니다."
    columns:
      - name: delivery_person_id
        description: "배송기사 고유 ID"
      - name: delivery_person_name
        description: "배송기사 이름"
      - name: phone_number
        description: "배송기사 연락처"
      - name: gender
        description: "성별 (Male, Female)"
      - name: date_of_joining
        description: "입사일 (YYYY-MM-DD)"
      - name: employment_type
        description: "고용 형태 (예: Full-time, Contract)"
      - name: vehicle_type
        description: "배송 수단 (예: Bike, Van)"
      - name: location_id
        description: "배송기사 소속 지역 ID (dim_location 참조)"

  - name: dim_fulfillment
    description: "풀필먼트 물류 방식 및 SLA 보장 기준 차원 테이블입니다."
    columns:
      - name: fulfillment_id
        description: "풀필먼트 고유 ID"
      - name: shipping_method
        description: "배송 방법 (예: Standard, Express, Next-day)"
      - name: service_level
        description: "서비스 수준 등급 (예: Economy, Premium)"
      - name: delivery_sla_days
        description: "SLA 보장 배송 기한 (일수)"
      - name: base_shipping_cost
        description: "기본 배송 요금"

  - name: dim_payment
    description: "결제 수단 및 대행 카드사 정보 차원 테이블입니다."
    columns:
      - name: payment_id
        description: "결제 수단 고유 ID"
      - name: payment_method
        description: "결제 방식 (예: Credit Card, Net Banking, UPI)"
      - name: payment_provider
        description: "결제 대행 기관 (예: Visa, Mastercard, RuPay)"

  - name: dim_product
    description: "상품 정보 마스터 차원 테이블입니다. 브랜드, 카테고리, 표준 리스트 가격을 관리합니다."
    columns:
      - name: product_id
        description: "상품 고유 ID"
      - name: product_name
        description: "상품명"
      - name: brand
        description: "제조 브랜드"
      - name: category
        description: "대분류 카테고리"
      - name: sub_category
        description: "중분류 카테고리"
      - name: list_price
        description: "표준 정가"

  - name: dim_seller
    description: "입점 셀러 마스터 차원 테이블입니다. 판매 카테고리 및 평가 평점을 포함합니다."
    columns:
      - name: seller_id
        description: "셀러 고유 ID"
      - name: seller_name
        description: "셀러 명칭"
      - name: email
        description: "셀러 대표 이메일"
      - name: join_date
        description: "입점일 (YYYY-MM-DD)"
      - name: location_id
        description: "셀러 소재지 ID (dim_location 참조)"
      - name: rating
        description: "셀러 고객 만족도 평점 (1.0 ~ 5.0)"
      - name: category_focus
        description: "주력 판매 카테고리"

  - name: fact_customer_rfm
    description: "고객별 구매 거래 기준 RFM(Recency, Frequency, Monetary) 분석 및 가치 등급 지표 팩트 테이블입니다."
    columns:
      - name: customer_id
        description: "고객 고유 ID (SHA-256 단방향 암호화 처리됨, dim_customer와 조인 가능)"
      - name: recency_days
        description: "마지막 구매 후 경과 일수"
      - name: frequency_orders
        description: "총 주문 건수"
      - name: monetary_value
        description: "총 구매 누적 금액"
      - name: avg_order_value
        description: "주문당 평균 결제 금액"
      - name: first_purchase_date
        description: "최초 구매 일자 (YYYY-MM-DD)"
      - name: last_purchase_date
        description: "최근 구매 일자 (YYYY-MM-DD)"
      - name: customer_lifetime_days
        description: "고객 생애 활성 일수 (최근 구매일 - 최초 구매일)"
      - name: rfm_score
        description: "RFM 종합 점수 (정수형)"
      - name: customer_segment
        description: "RFM 기반 고객 세그먼트 (예: Champions, Loyal Customers, At Risk 등)"

  - name: fact_fulfillment_performance
    description: "배송 일자, 물류 수단, 기사, 지역별 배송 처리 실적 및 SLA 미준수율 집계 팩트 테이블입니다."
    columns:
      - name: date_id
        description: "배송 일자 ID (dim_calendar와 조인 가능)"
      - name: fulfillment_id
        description: "물류 풀필먼트 ID (dim_fulfillment와 조인 가능)"
      - name: location_id
        description: "배송 지역 ID (dim_location과 조인 가능)"
      - name: delivery_person_id
        description: "담당 배송 기사 ID (dim_delivery_person과 조인 가능)"
      - name: total_deliveries
        description: "총 배송 의뢰 건수"
      - name: completed_deliveries
        description: "배송 완료 건수"
      - name: returned_deliveries
        description: "반품/회수 건수"
      - name: avg_delivery_delay_days
        description: "평균 배송 지연 일수"
      - name: avg_delivery_rating
        description: "평균 배송 만족도 평점"
      - name: total_shipping_cost
        description: "총 발생 배송 비용"
      - name: sla_breach_rate
        description: "SLA 납기 기한 위반 비율"
      - name: return_rate
        description: "회수/반품 발생 비율"

  - name: fact_marketing_spend
    description: "일별, 캠페인별 마케팅 광고 집행 비용과 클릭수, 전환수 및 직결 매출 성과 팩트 테이블입니다."
    columns:
      - name: marketing_id
        description: "마케팅 집행 고유 식별자"
      - name: date_id
        description: "광고 일자 ID (dim_calendar와 조인 가능)"
      - name: campaign_id
        description: "진행 캠페인 ID (dim_campaign과 조인 가능)"
      - name: channel_id
        description: "유입 채널 ID (dim_channel과 조인 가능)"
      - name: spend_amount
        description: "광고비 집행 금액"
      - name: impressions
        description: "광고 노출 횟수"
      - name: clicks
        description: "광고 클릭수"
      - name: conversions
        description: "광고를 통한 구매 전환수"
      - name: revenue_generated
        description: "광고 직결 발생 매출액"

  - name: fact_orders
    description: "주문 상세 트랜잭션 단위 팩트 테이블입니다. 매출, 할인, 배송 정보가 종합 수록되어 있으며 분석용 핵심 데이터입니다."
    columns:
      - name: order_line_id
        description: "주문 개별 상품 항목(Line Item) 고유 ID (Primary Key)"
      - name: order_id
        description: "주문 번호 (동일 주문 내 여러 상품이 동일 order_id 공유)"
      - name: date_id
        description: "주문 일자 ID (dim_calendar와 조인 가능, 형식: YYYYMMDD)"
      - name: order_date
        description: "주문 일자 (YYYY-MM-DD)"
      - name: customer_id
        description: "주문 고객 ID (SHA-256 마스킹, dim_customer와 조인 가능)"
      - name: product_id
        description: "주문 상품 ID (dim_product와 조인 가능)"
      - name: category
        description: "주문 상품 대분류 카테고리"
      - name: seller_id
        description: "판매 셀러 ID (dim_seller와 조인 가능)"
      - name: seller_rating
        description: "거래 시점 셀러의 평점"
      - name: location_id
        description: "배송 목적지 지역 ID (dim_location과 조인 가능)"
      - name: delivery_person_id
        description: "배송 기사 ID (dim_delivery_person과 조인 가능)"
      - name: payment_id
        description: "결제 수단 ID (dim_payment와 조인 가능)"
      - name: campaign_id
        description: "유입 마케팅 캠페인 ID (dim_campaign과 조인 가능)"
      - name: fulfillment_id
        description: "선택 물류 배송 방식 ID (dim_fulfillment와 조인 가능)"
      - name: quantity
        description: "구매 수량"
      - name: unit_price
        description: "상품 단가"
      - name: discount_percentage
        description: "적용 할인율 (%)"
      - name: tax_percentage
        description: "적용 세율 (%)"
      - name: shipping_fee
        description: "부과된 배송 요금"
      - name: expected_delivery_date
        description: "배송 예정일 (YYYY-MM-DD)"
      - name: actual_delivery_date
        description: "실제 배송 완료일 (YYYY-MM-DD)"
      - name: delivery_rating
        description: "배송 기사 서비스 평점"
      - name: order_status
        description: "주문 현재 상태 (예: Completed, Cancelled, Returned, Shipped 등)"
      - name: return_flag
        description: "반품 신청 여부 (true: 반품됨, false: 유지)"
      - name: refund_amount
        description: "환불 처리된 금액"
      - name: return_date
        description: "반품 완료 일자 (YYYY-MM-DD)"
      - name: customer_rating
        description: "고객 상품 만족도 평점"
      - name: review_text
        description: "고객 구매 리뷰 텍스트"
      - name: sentiment_score
        description: "리뷰 감성 분석 점수 (-1.0 ~ 1.0)"
      - name: delivery_delay_days
        description: "배송 지연 일수 (실제배송일 - 예정일, 조기완료 시 음수 또는 0)"
      - name: delivery_sla_days
        description: "해당 배송의 약정 SLA 기간"
      - name: gross_amount
        description: "할인 전 총액 (수량 * 단가)"
      - name: discount_amount
        description: "할인 적용 차감 금액"
      - name: tax_amount
        description: "과세된 세금 금액"
      - name: net_amount
        description: "할인 및 세금이 모두 반영된 고객 최종 실 결제 금액"

  - name: fact_returns
    description: "고객 반품 트랜잭션 수준의 팩트 테이블입니다. 반품 수량 및 환불, 재입고 수수료를 관리합니다."
    columns:
      - name: order_line_id
        description: "반품 대상 주문 상품 항목 고유 ID (fact_orders.order_line_id와 1:1 매핑)"
      - name: order_id
        description: "주문 번호"
      - name: date_id
        description: "반품 완료 일자 ID (dim_calendar와 조인 가능)"
      - name: customer_id
        description: "반품 신청 고객 ID (SHA-256 마스킹)"
      - name: product_id
        description: "반품 상품 ID"
      - name: location_id
        description: "반품 출지 지역 ID"
      - name: payment_id
        description: "원 거래 결제 수단 ID"
      - name: fulfillment_id
        description: "원 거래 물류 방식 ID"
      - name: quantity
        description: "반품 수량"
      - name: unit_price
        description: "상품 단가"
      - name: refund_amount
        description: "환불 지급 금액 (일반적으로 음수 부호)"
      - name: review_text
        description: "반품 사유/리뷰 텍스트"
      - name: days_to_return
        description: "수령 후 반품까지 걸린 일수"
      - name: restocking_fee
        description: "반품에 따른 재입고 처리 수수료"
      - name: customer_rating
        description: "반품 접수 평점"
      - name: sentiment_score
        description: "반품 리뷰 감성 분석 점수"
